name: EVEZ Auto-Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Health Check
        run: |
          echo "Checking EVEZ ecosystem health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://evez-provider-production.up.railway.app/health 2>/dev/null || echo "000")
          echo "Railway Provider Status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "::warning::Railway provider unreachable — may need manual intervention"
          fi
