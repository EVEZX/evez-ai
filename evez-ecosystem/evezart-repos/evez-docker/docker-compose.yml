# EVEZ-OS Full Stack — Docker Compose
# Memory: ~1.8GB total on 2GB host (with swap)
# Each service: 64-128MB limit

services:
  clawbreak:
    build: .
    command: python -m uvicorn services.clawbreak:app --host 0.0.0.0 --port 8080
    mem_limit: 96m
    cpus: 0.5
    environment: [PORT=8080]
    ports: ["127.0.0.1:8080:8080"]
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: "10m", max-file: "2"}}

  vcl:
