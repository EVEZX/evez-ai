  # Infrastructure
  caddy:
    image: caddy:2.8.6-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 64m
    cpus: 0.25
    restart: unless-stopped
    depends_on:
      clawbreak: {condition: service_healthy}
      observatory: {condition: service_healthy}
    logging: {driver: json-file, options: {max-size: "10m", max-file: "2"}}

volumes:
