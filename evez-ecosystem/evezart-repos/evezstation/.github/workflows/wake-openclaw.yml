name: Start OpenClaw Machines
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wake-openclaw.yml'

jobs:
  wake:
    name: Start OpenClaw on Fly
    runs-on: [self-hosted, linux, x64, evez]
    steps:
      - name: Install flyctl
        run: |
          if ! command -v fly &>/dev/null; then
            curl -L https://fly.io/install.sh | FLYCTL_INSTALL=$HOME/.fly sh
          fi
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          
      - name: Set fly auth token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret not set"
            exit 1
          fi
          fly auth token 2>/dev/null || true
          
      - name: Wake up OpenClaw Instance 1 (openclaws-qol4-a)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          echo "=== openclaws-qol4-a ==="
          # Inject all model secrets
          fly secrets set \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            CEREBRAS_API_KEY="${{ secrets.CEREBRAS_API_KEY }}" \
            CSK_KEY="${{ secrets.CSK_KEY }}" \
            --app openclaws-qol4-a 2>/dev/null && echo "Secrets set ✅" || echo "Secrets warning"
          # Start the machine
          fly machine start 2867001f429778 --app openclaws-qol4-a
          echo "Machine started ✅"
          # Wait and check health
          sleep 15
          curl -sf https://openclaws-qol4-a.fly.dev/health && echo "Health OK ✅" || echo "Health check pending"
          
      - name: Wake up OpenClaw Instance 2 (openclaw-pfncdg)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          echo "=== openclaw-pfncdg ==="
          fly secrets set \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            CEREBRAS_API_KEY="${{ secrets.CEREBRAS_API_KEY }}" \
            CSK_KEY="${{ secrets.CSK_KEY }}" \
            --app openclaw-pfncdg 2>/dev/null && echo "Secrets set ✅" || echo "Secrets warning"
          fly machine start d890e34a701468 --app openclaw-pfncdg
          echo "Machine started ✅"
          sleep 15
          curl -sf https://openclaw-pfncdg.fly.dev/health && echo "Health OK ✅" || echo "Health check pending"
          
      - name: Summary
        run: |
          echo "=== OpenClaw Status ==="
          export PATH="$HOME/.fly/bin:$PATH"
          fly status --app openclaws-qol4-a 2>/dev/null | head -10 || echo "Cannot check status"
          fly status --app openclaw-pfncdg 2>/dev/null | head -10 || echo "Cannot check status"
          echo ""
          echo "Instance 1: https://openclaws-qol4-a.fly.dev"
          echo "Instance 2: https://openclaw-pfncdg.fly.dev"
