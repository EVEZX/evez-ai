name: ClawBreak Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt 2>/dev/null || pip install fastapi uvicorn httpx groq
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
