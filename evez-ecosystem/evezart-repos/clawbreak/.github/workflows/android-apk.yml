name: Build Android APK -- Samsung A16

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate gradle-wrapper.jar
        working-directory: android-native
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew
          ls -la gradle/wrapper/

      - name: Build Debug APK
        working-directory: android-native
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawBreak-A16-debug
          path: android-native/app/build/outputs/apk/debug/
          retention-days: 90

      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find android-native/app/build/outputs/apk -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            gh release create "apk-build-${{ github.run_number }}" \
              --title "ClawBreak A16 Build #${{ github.run_number }}" \
              --notes 'Samsung Galaxy A16 debug APK. Install: Settings > Apps > Install unknown apps, then tap the APK.' \
              "$APK" || true
          fi
