services:
  - type: web
    name: clawbreak
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    env: python
    plan: free
    envVars:
      - key: CLAWBREAK_PORT
        value: 8080
      - key: PYTHON_VERSION
        value: "3.12"
    healthCheckPath: /health
