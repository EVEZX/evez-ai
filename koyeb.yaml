name: evez-provider
service:
  name: evez-provider
  instance_type: nano
  regions:
    - fra
  ports:
    - port: 9100
      protocol: http
  routes:
    - port: 9100
  scalings:
    - min: 1
      max: 1
  health:
    http:
      port: 9100
      path: /health
  sources:
    - docker:
        image: evezx/evez-provider:latest
  env:
    - key: VULTR_API_KEY
    - key: OPENROUTER_API_KEY
    - key: GROQ_API_KEY
